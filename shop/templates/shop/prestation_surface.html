{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<!-- Conteneur principal limité en largeur et centré -->
<div style="max-width: 1100px; margin: 40px auto; padding: 0 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    
    <!-- Structure Flexible : Force le côte-à-côte sur ordinateur -->
    <div style="display: flex; flex-wrap: wrap; gap: 30px; align-items: start;">
        
        <!-- 📸 BLOC GAUCHE : L'Image de la Prestation (Largeur contrôlée) -->
        <div style="flex: 1; min-width: 320px; max-width: 500px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; padding: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);">
            {% if prestation.image %}
                <!-- 🟢 Conservé : id="image-prestation" pour permettre le ciblage visuel -->
                <img src="{{ prestation.image.url }}" id="image-prestation" style="border-radius: 16px; width: 100%; height: auto; display: block; object-fit: contain;" alt="{{ prestation.titre }}">
            {% else %}
                <div style="background: #f8fafc; height: 350px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 5rem;">{{ define_emoji }}</div>
            {% endif %}
        </div>

        <!-- 📝 BLOC DROIT : Le Formulaire Commercial -->
        <div style="flex: 1.2; min-width: 320px; background: #ffffff; border: 1px solid #f1f5f9; border-radius: 24px; padding: 32px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);">
            
            <h1 style="color: #1e1b4b; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 6px; display: flex; align-items: center; gap: 8px;">
                <span>{{ define_emoji }}</span> {{ prestation.titre }}
            </h1>
            <p style="color: #64748b; font-size: 0.875rem; line-height: 1.5; margin-bottom: 24px;">
                {{ prestation.description }}
            </p>

            <form method="POST" action="">
                {% csrf_token %}
                
                <!-- Sélection des Dimensions -->
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; font-size: 0.85rem; color: #334155; margin-bottom: 8px;">
                        Dimensions disponibles :
                    </label>
                    <!-- 🟢 Unifié et nettoyé : Embarque correctement l'attribut data-img pour chaque option -->
                    <select name="dimensions_m2" id="dimensions_m2" style="width: 100%; border-radius: 12px; font-size: 0.95rem; padding: 14px 16px; border: 1.5px solid #cbd5e1; color: #0f172a; background-color: #ffffff; box-sizing: border-box;" required>
                        <option value="" disabled selected>-- Choisir une dimension --</option>
                        {% for grille in grilles_surface %}
                            <option value="{{ grille.id }}" data-img="{% if grille.image %}{{ grille.image.url }}{% endif %}">
                                {{ grille.dimensions }} ({{ grille.prix_total }} FCFA)
                            </option>
                        {% endfor %}
                        <option value="custom">📐 Dimensions sur-mesure (Calcul libre)</option>
                    </select>
                </div>

                <!-- BLOC LONGUEUR / LARGEUR : Masqué proprement, passe en flex au besoin -->
                <div id="champs-custom" style="display: none; gap: 15px; margin-bottom: 20px;">
                    <div style="flex: 1;">
                        <label style="display: block; font-weight: 600; font-size: 0.80rem; color: #475569; margin-bottom: 6px;">Largeur (mètres) :</label>
                        <input type="number" step="0.1" min="0.1" name="largeur_custom" value="1.0" style="width: 100%; border-radius: 10px; padding: 12px; border: 1.5px solid #cbd5e1; box-sizing: border-box;">
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-weight: 600; font-size: 0.80rem; color: #475569; margin-bottom: 6px;">Hauteur (mètres) :</label>
                        <input type="number" step="0.1" min="0.1" name="hauteur_custom" value="1.0" style="width: 100%; border-radius: 10px; padding: 12px; border: 1.5px solid #cbd5e1; box-sizing: border-box;">
                    </div>
                </div>

                <!-- Saisie de la Quantité -->
                <div style="margin-bottom: 24px;">
                    <label style="display: block; font-weight: 600; font-size: 0.85rem; color: #334155; margin-bottom: 8px;">
                        Quantité souhaitée :
                    </label>
                    <input type="number" min="1" name="quantite_lot" value="1" style="width: 100%; border-radius: 12px; font-size: 0.95rem; padding: 14px 16px; border: 1.5px solid #cbd5e1; box-sizing: border-box;" required>
                </div>

                <!-- Gros Bouton d'action violet -->
                <button type="submit" style="display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 16px; background-color: #7c3aed; color: #ffffff; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.025em; cursor: pointer; box-shadow: 0 4px 14px rgba(124, 58, 237, 0.3);">
                    🛒 Valider et calculer mon prix
                </button>
            </form>

        </div>
    </div>
</div>

<script>
// 🟢 Unique écouteur d'événement fusionné et propre (Image + Saisie Libre)
document.getElementById('dimensions_m2').addEventListener('change', function() {
    const customDiv = document.getElementById('champs-custom');
    
    // 1. Changement de l'image en direct
    const optionSelectionnee = this.options[this.selectedIndex];
    const urlImageSurface = optionSelectionnee.getAttribute('data-img');
    const grandeImage = document.getElementById('image-prestation');
    
    if (urlImageSurface && grandeImage) {
        grandeImage.src = urlImageSurface;
    } else if (grandeImage) {
        grandeImage.src = "{{ prestation.image.url }}";
    }

    // 2. Gestion de l'affichage des inputs largeur/hauteur
    if (this.value === 'custom') {
        customDiv.style.display = 'flex'; // Affiche côte à côte
    } else {
        customDiv.style.display = 'none'; // Masque le bloc
    }
});
</script>
{% endblock %}
