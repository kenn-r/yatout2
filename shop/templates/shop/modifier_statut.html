<div class="max-w-xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 my-6 border border-gray-100">
    <!-- En-tête de la commande -->
    <div class="flex justify-between items-center border-b pb-4 mb-4">
        <div>
            <h3 class="text-lg font-bold text-gray-800">Commande #{{ commande.id }}</h3>
            <p class="text-sm text-gray-500">{{ commande.date_creation|date:"d/m/Y H:i" }}</p>
        </div>
        <!-- Badge du statut actuel -->
        <span class="px-3 py-1 rounded-full text-xs font-semibold 
            {% if commande.statut == 'Reçue' %} bg-blue-100 text-blue-800
            {% elif commande.statut == 'Préparée' %} bg-yellow-100 text-yellow-800
            {% elif commande.statut == 'Expédiée' %} bg-indigo-100 text-indigo-800
            {% elif commande.statut == 'Livrée' %} bg-green-100 text-green-800
            {% else %} bg-gray-100 text-gray-800 {% endif %}">
            {{ commande.statut }}
        </span>
    </div>

    <!-- Détails du produit -->
    <div class="mb-6">
        <p class="text-sm font-medium text-gray-600">Produit : <span class="text-gray-900 font-semibold">{{ commande.produit.nom }}</span></p>
        <p class="text-sm font-medium text-gray-600">Client : <span class="text-gray-900">{{ commande.acheteur.username }}</span></p>
    </div>

    <!-- Actions de changement de statut -->
    <div>
        <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">Modifier le statut :</p>
        <div class="grid grid-cols-2 gap-2 sm:grid-cols-4">
            
            <!-- Bouton Reçue -->
            <a href="{% url 'modifier_statut_commande' pk=commande.pk nouveau_statut='Reçue' %}" 
               class="px-3 py-2 text-center text-xs font-medium rounded-lg border transition-all duration-200
               {% if commande.statut == 'Reçue' %} bg-blue-600 text-white border-blue-600 shadow-sm {% else %} bg-white text-blue-600 border-blue-200 hover:bg-blue-50 {% endif %}">
                Reçue
            </a>

            <!-- Bouton Préparée -->
            <a href="{% url 'modifier_statut_commande' pk=commande.pk nouveau_statut='Préparée' %}" 
               class="px-3 py-2 text-center text-xs font-medium rounded-lg border transition-all duration-200
               {% if commande.statut == 'Préparée' %} bg-yellow-500 text-white border-yellow-500 shadow-sm {% else %} bg-white text-yellow-600 border-yellow-200 hover:bg-yellow-50 {% endif %}">
                Préparée
            </a>

            <!-- Bouton Expédiée -->
            <a href="{% url 'modifier_statut_commande' pk=commande.pk nouveau_statut='Expédiée' %}" 
               class="px-3 py-2 text-center text-xs font-medium rounded-lg border transition-all duration-200
               {% if commande.statut == 'Expédiée' %} bg-indigo-600 text-white border-indigo-600 shadow-sm {% else %} bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50 {% endif %}">
                Expédiée
            </a>

            <!-- Bouton Livrée -->
            <a href="{% url 'modifier_statut_commande' pk=commande.pk nouveau_statut='Livrée' %}" 
               class="px-3 py-2 text-center text-xs font-medium rounded-lg border transition-all duration-200
               {% if commande.statut == 'Livrée' %} bg-green-600 text-white border-green-600 shadow-sm {% else %} bg-white text-green-600 border-green-200 hover:bg-green-50 {% endif %}">
                Livrée
            </a>

        </div>
    </div>
</div>
