{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<!-- Conteneur principal limité en largeur et centré -->
<div style="max-width: 1100px; margin: 40px auto; padding: 0 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    
    <!-- Structure Flexible : Force le côte-à-côte sur ordinateur -->
    <div style="display: flex; flex-wrap: wrap; gap: 30px; align-items: start;">
        
        <!-- 📸 BLOC GAUCHE : L'Image des Flyers (Largeur contrôlée) -->
        <div style="flex: 1; min-width: 320px; max-width: 500px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; padding: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);">
            {% if prestation.image %}
                <img src="{{ prestation.image.url }}" id="image-prestation" style="border-radius: 16px; width: 100%; height: auto; display: block; object-fit: contain;" alt="{{ prestation.titre }}">
            {% else %}
                <div style="background: #f8fafc; height: 350px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 5rem;">📦</div>
            {% endif %}
        </div>

        <!-- 📝 BLOC DROIT : Le Formulaire Commercial Stylisé -->
        <div style="flex: 1.2; min-width: 320px; background: #ffffff; border: 1px solid #f1f5f9; border-radius: 24px; padding: 32px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);">
            
            <h1 style="color: #1e1b4b; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 6px;">
                🚀 {{ prestation.titre }}
            </h1>
            <p style="color: #64748b; font-size: 0.875rem; line-height: 1.5; margin-bottom: 24px;">
                {{ prestation.description }}
            </p>

            <form method="POST" action="">
                {% csrf_token %}

                <!-- Sélection du Format -->
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; font-size: 0.85rem; color: #334155; margin-bottom: 8px;">
                        Format du flyer :
                    </label>
                    <select name="format_choisi" id="format_choisi" style="width: 100%; border-radius: 12px; font-size: 0.95rem; padding: 14px 16px; border: 1.5px solid #cbd5e1; color: #0f172a; background-color: #ffffff; box-sizing: border-box;" required>
    <option value="" disabled selected>-- Choisir un format --</option>
    {% for format in formats_flyer %}
        <!-- 🟢 AJOUT : data-img transmet l'adresse de l'image du format à JavaScript -->
        <option value="{{ format.id }}" data-img="{% if format.image %}{{ format.image.url }}{% endif %}">
            {{ format.nom_format }}
        </option>
    {% endfor %}
</select>
</div>

                <!-- Sélection du volume (Alimenté dynamiquement selon le format choisi) -->
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; font-size: 0.85rem; color: #334155; margin-bottom: 8px;">
                        Quantité :
                    </label>
                    <select name="quantite_lot" id="quantite_lot" style="width: 100%; border-radius: 12px; font-size: 0.95rem; padding: 14px 16px; border: 1.5px solid #cbd5e1; color: #0f172a; background-color: #f8fafc; box-sizing: border-box;" disabled required>
                        <option value="">Sélectionnez d'abord un format</option>
                    </select>
                </div>

                <!-- Case de saisie numérique masquée pour quantité libre -->
                <div id="wrapper-custom-flyer" style="display: none; margin-bottom: 24px;">
                    <label style="display: block; font-weight: 600; font-size: 0.85rem; color: #475569; margin-bottom: 8px;">
                        Saisissez la quantité libre souhaitée :
                    </label>
                    <input type="number" min="1" name="quantite_custom" id="quantite_custom" value="600" style="width: 100%; border-radius: 12px; font-size: 0.95rem; padding: 14px 16px; border: 1.5px solid #cbd5e1; box-sizing: border-box;">
                </div>

                <!-- Gros Bouton d'action violet -->
                <button type="submit" id="btn-submit" style="display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 16px; background-color: #7c3aed; color: #ffffff; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.025em; cursor: pointer; box-shadow: 0 4px 14px rgba(124, 58, 237, 0.3);" disabled>
                    🛒 Valider et voir le prix final
                </button>
            </form>

        </div>
    </div>
</div>

<script>
// Gestion complète du changement de format (Image + Quantités associées)
document.getElementById('format_choisi').addEventListener('change', function() {
    const formatId = this.value;
    const qteSelect = document.getElementById('quantite_lot');
    
    // 🟢 1. MISE À JOUR DYNAMIQUE DE L'IMAGE À GAUCHE
    const optionSelectionnee = this.options[this.selectedIndex];
    const urlImageFormat = optionSelectionnee.getAttribute('data-img');
    const grandeImage = document.getElementById('image-prestation');
    
    if (urlImageFormat && grandeImage) {
        grandeImage.src = urlImageFormat;
    } else if (grandeImage) {
        // Si le format n'a pas d'image, on remet l'image par défaut de la prestation
        grandeImage.src = "{{ prestation.image.url }}";
    }
    
    // 🟢 2. RECONSTRUCTION DES OPTIONS DE QUANTITÉS LIÉES
    qteSelect.innerHTML = '<option value="" disabled selected>-- Choisir la quantité --</option>';
    
    // Injection dynamique des lots liés au format via Django
    {% for format in formats_flyer %}
        if (formatId == "{{ format.id }}") {
            {% for option in format.options_quantite.all %}
                qteSelect.innerHTML += '<option value="{{ option.quantite }}">{{ option.quantite }} exemplaires</option>';
            {% endfor %}
        }
    {% endfor %}
    
    // Option sur-mesure permanente
    qteSelect.innerHTML += '<option value="custom">Saisir une quantité libre (Sur-mesure)</option>';
    
    // Déblocage visuel du champ quantité
    qteSelect.disabled = false;
    qteSelect.style.backgroundColor = '#ffffff';
});

// Affiche ou masque la case numérique si choix "Saisir une quantité libre"
document.getElementById('quantite_lot').addEventListener('change', function() {
    const customField = document.getElementById('wrapper-custom-flyer');
    const btnSubmit = document.getElementById('btn-submit');
    
    if (this.value === 'custom') {
        customField.style.style.display = 'block';
    } else {
        customField.style.style.display = 'none';
    }
    
    // Débloque le gros bouton violet dès qu'une quantité est fixée
    if (this.value) {
        btnSubmit.disabled = false;
    }
});
</script>
{% endblock %}
